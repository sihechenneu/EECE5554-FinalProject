turtlebot4_node:
  ros__parameters:
    wifi:
      interface: "wlan0"

    # Disable power_saver so turtlebot4_node does NOT call oakd/stop_camera.
    # We manage the OAK-D camera ourselves via oakd_yolo.launch.py.
    power_saver: false

    buttons:
      create3_1: ["Dock", "Wall Follow Left", "2000"]
      create3_power: ["EStop", "Power", "3000"]
      create3_2: ["Undock", "Wall Follow Right", "2000"]
      hmi_1: ["Select"]
      hmi_2: ["Back"]
      hmi_3: ["Scroll Up"]
      hmi_4: ["Scroll Down"]

    menu:
      entries: ["Dock", "Undock", "EStop", "Wall Follow Left", "Wall Follow Right", "Power", "Help"]

    controller:
      a: ["Select"]
      b: ["EStop"]
      x: ["Back"]
      up: ["Scroll Up"]
      down: ["Scroll Down"]
      l2: ["Wall Follow Left"]
      r2: ["Wall Follow Right"]
      home: ["Dock", "Undock", "3000"]

turtlebot4_base_node:
  ros__parameters:
    gpio:
      user_button_1: 19
      user_button_2: 16
      user_button_3: 26
      user_button_4: 20
      led_green_power: 17
      led_green_motors: 18
      led_green_comms: 27
      led_green_wifi: 24
      led_green_battery: 22
      led_red_battery: 23
      led_green_user_1: 25
      led_green_user_2: 6
      led_red_user_2: 21
      display_reset: 13
