/oakd:
  ros__parameters:
    camera:
      i_enable_imu: false          # IMU unused by any node — saves VPU bandwidth
      i_enable_ir: true            # Keep IR dot projector for better stereo depth indoors
      i_floodlight_brightness: 1   # Floodlight off — dot projector is enough
      i_laser_dot_brightness: 800
      i_pipeline_type: RGBD
      i_nn_type: spatial
      i_usb_speed: SUPER
    rgb:
      i_board_socket_id: 0
      i_fps: 10.0
      i_interleaved: false
      i_max_q_size: 2              # Was 10 — only keep the latest frame
      i_preview_width: 320
      i_preview_height: 240
      i_enable_preview: true
      i_low_bandwidth: true
      i_keep_preview_aspect_ratio: true
      i_publish_topic: false       # RGB image not subscribed to by any node; camera_info still published
      i_resolution: '1080P'
    stereo:
      i_publish_topic: true        # Depth required by spatial_calculator
      i_width: 320
      i_height: 240
      i_fps: 10.0
      i_max_q_size: 2              # Only keep the latest depth frame
      i_align_depth: true
      i_enable_decimation_filter: true
      i_extended_disp: true
      i_subpixel: true
      i_lr_check: true
    left:
      i_fps: 10.0
      i_publish_topic: false       # Used on-device for stereo matching only — no need to send over USB
      i_resolution: '400P'
    right:
      i_fps: 10.0
      i_publish_topic: false       # Same as left
      i_resolution: '400P'
    use_sim_time: false
    nn:
      i_nn_config_path: "yolov8.json"
